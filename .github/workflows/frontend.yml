name: Frontend

on:
  push:
    paths:
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - '.nvmrc'
      - 'frontend/**'
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - '.nvmrc'
      - 'frontend/**'
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack and activate repo Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck:frontend

      - name: Unit tests
        run: yarn test:frontend:unit
        env:
          NODE_ENV: test

  e2e:
    name: Playwright auth smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack and activate repo Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn --version

      - name: Install workspace dependencies
        run: yarn install --immutable

      - name: Install Playwright Chromium
        run: yarn workspace frontend playwright install chromium --with-deps

      - name: Pin tenant hosts for CI
        run: |
          {
            echo "127.0.0.1 goodwill-open.lvh.me"
            echo "127.0.0.1 goodwill-ca.lvh.me"
            echo "127.0.0.1 does-not-exist.lvh.me"
          } | sudo tee -a /etc/hosts
          getent hosts goodwill-open.lvh.me
          getent hosts goodwill-ca.lvh.me
          getent hosts does-not-exist.lvh.me

      - name: Write infra/.env.stack for CI
        run: |
          cat > infra/.env.stack << 'ENVEOF'
          NODE_ENV=development
          PORT=3001

          POSTGRES_DB=auth_lab
          POSTGRES_USER=auth_lab
          POSTGRES_PASSWORD=auth_lab
          DATABASE_URL=postgres://auth_lab:auth_lab@postgres:5432/auth_lab
          REDIS_URL=redis://redis:6379

          LOG_LEVEL=info
          SERVICE_NAME=auth-lab-backend

          BCRYPT_COST=4
          SESSION_TTL_SECONDS=86400

          # MFA
          MFA_ISSUER=Hubins
          MFA_ENCRYPTION_KEY_BASE64=N0uFFqX7KeFnhghnTMaeBdLKsn+W2Q9WJE1D2Aqdf14=
          MFA_HMAC_KEY_BASE64=ygcc6Pr65aoBSF469cwcsVj+ARz1Pb2voHHHtt3bbCQ=

          # SSO
          # Must NOT be all-zeros outside NODE_ENV=test.
          SSO_STATE_ENCRYPTION_KEY=g+0YvJfzVdIgM+eoUUQ5UW3JKuGktJbtA6mvi3DcZDQ=
          SSO_REDIRECT_BASE_URL=http://goodwill-ca.lvh.me:3000/api
          GOOGLE_CLIENT_ID=ci-placeholder-google-client-id
          GOOGLE_CLIENT_SECRET=ci-placeholder-google-client-secret
          MICROSOFT_CLIENT_ID=ci-placeholder-microsoft-client-id
          MICROSOFT_CLIENT_SECRET=ci-placeholder-microsoft-client-secret

          # Local OIDC (CI only)
          LOCAL_OIDC_ENABLED=true
          LOCAL_OIDC_ISSUER=http://local-oidc:9998
          LOCAL_OIDC_CLIENT_ID=local-oidc-ci-client

          # Outbox
          # Must be different from MFA_ENCRYPTION_KEY_BASE64.
          OUTBOX_ENC_DEFAULT_VERSION=v1
          OUTBOX_ENC_KEY_V1=pjVKt5jeXMDX5YJkbDc1dDFW4ztqO1iRyHiAHi/9TjM=
          OUTBOX_POLL_INTERVAL_MS=2000
          OUTBOX_BATCH_SIZE=10
          OUTBOX_MAX_ATTEMPTS=5

          # Email
          EMAIL_PROVIDER=smtp
          SMTP_HOST=mailpit
          SMTP_PORT=1025
          SMTP_SECURE=false
          SMTP_FROM=Hubins <noreply@hubins.local>
          SMTP_PUBLIC_BASE_URL=http://{tenantKey}.lvh.me:3000

          # Dev seed
          SEED_ON_START=true
          SEED_TENANT_KEY=goodwill-ca
          SEED_TENANT_NAME=GoodWill California
          SEED_ADMIN_EMAIL=system_admin@example.com
          SEED_INVITE_TTL_HOURS=168

          # Frontend container runtime / build
          FRONTEND_INTERNAL_API_URL=http://backend:3001
          CP_INTERNAL_API_URL=http://backend:3001
          NEXT_PUBLIC_ENV=development
          ENVEOF

      - name: Start Docker Compose stack (with local OIDC overlay)
        run: |
          set +e
          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            up --build -d
          compose_exit=$?
          set -e

          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            ps || true

          if [ "$compose_exit" -ne 0 ]; then
            echo "::warning::docker compose up returned exit code ${compose_exit}; continuing to explicit readiness checks."
            docker compose --env-file infra/.env.stack \
              -f infra/docker-compose.yml \
              -f infra/docker-compose-ci-oidc.yml \
              logs local-oidc backend frontend proxy cp --tail=100 || true
          fi

      - name: Wait for backend healthy
        # WHY docker inspect instead of curl-through-proxy:
        #
        # Previously this step polled http://goodwill-ca.lvh.me:3000/api/health,
        # which routes through the Caddy proxy. Even after fixing the proxy
        # depends_on (docker-compose.yml), the curl still failed — Caddy had zero
        # access log entries, meaning the runner's HTTP request never reached the
        # container. This is a known iptables/userland-proxy behaviour in GitHub
        # Actions: the host→Docker port forwarding path for hostname-resolved
        # requests is unreliable in some runner kernel configurations, even when
        # `docker ps` shows `0.0.0.0:3000->3000/tcp` bound and the Docker
        # healthcheck is passing.
        #
        # Docker is already tracking backend health correctly via its own
        # internal healthcheck (wget localhost:${PORT}/health inside the container).
        # Querying that state via `docker inspect` completely bypasses the
        # hostname-resolution → iptables → userland-proxy chain that was failing.
        #
        # WHY 90 iterations (270s):
        # Cold CI runner: backend image build (yarn install + tsc) + postgres/redis
        # startup + DB migrations can approach 3–4 minutes. 270s is safe headroom.
        run: |
          for i in $(seq 1 90); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' hubins-backend-1 2>/dev/null || echo "not-found")
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Backend Docker-healthy (attempt ${i})"
              exit 0
            fi
            echo "  backend health status: ${STATUS} (attempt ${i}/90)"
            sleep 3
          done
          echo "❌ Backend did not become healthy within 270s"
          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            ps || true
          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            logs proxy backend frontend local-oidc --tail=150 || true
          exit 1

      - name: Verify proxy routes /api to backend
        # WHY a separate step: the docker inspect above confirms the backend is
        # healthy inside Docker. This step confirms Caddy is actually routing
        # /api/* to the backend correctly before Playwright runs.
        #
        # WHY localhost + explicit Host header instead of the hostname URL:
        # curl http://localhost:3000 connects directly to the bound port without
        # going through DNS resolution. Setting Host: manually gives Caddy the
        # tenant context it needs to match the *.lvh.me:3000 site block and route
        # /api/health to the backend. This sidesteps the iptables/userland-proxy
        # issue that caused the previous curl-via-hostname approach to fail silently.
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Host: goodwill-ca.lvh.me" \
            http://localhost:3000/api/health 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Proxy routing verified — /api/health returned HTTP ${STATUS}"
          else
            echo "❌ Proxy routing check failed — HTTP ${STATUS}"
            echo "--- verbose curl output ---"
            curl -v -H "Host: goodwill-ca.lvh.me" http://localhost:3000/api/health || true
            echo "--- Caddy logs ---"
            docker compose --env-file infra/.env.stack \
              -f infra/docker-compose.yml \
              -f infra/docker-compose-ci-oidc.yml \
              logs proxy --tail=50 || true
            exit 1
          fi

      - name: Wait for frontend healthy through proxy
        # WHY localhost + explicit Host header (not hostname URL):
        # Same iptables/userland-proxy issue as the backend check — curl via a
        # hostname that resolves to 127.0.0.1 fails to reach Docker's bound port
        # in this GH Actions runner environment. Using localhost:3000 with an
        # explicit Host header connects directly and lets Caddy route correctly.
        #
        # WHY 120 iterations (360s):
        # The frontend Docker image build (yarn install for the full workspace +
        # next build --standalone) runs in parallel with the backend build. On a
        # cold runner with no layer cache this can take 5–10 minutes. The backend
        # check above passes at ~3–4 minutes. 360s means the frontend has up to
        # ~9–10 minutes total from stack start — sufficient for worst-case cold builds.
        # The overall job timeout-minutes: 30 is the outer bound.
        run: |
          for i in $(seq 1 120); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "Host: goodwill-open.lvh.me" \
              http://localhost:3000/auth/login 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ]; then
              echo "✅ Frontend healthy through proxy — /auth/login returned HTTP ${STATUS} (attempt ${i})"
              exit 0
            fi
            echo "  frontend status: HTTP ${STATUS} (attempt ${i}/120)"
            sleep 3
          done
          echo "❌ Frontend did not become healthy through proxy within 360s"
          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            ps || true
          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            logs proxy backend frontend local-oidc --tail=150 || true
          exit 1

      - name: Wait for local OIDC server healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9998/.well-known/jwks.json > /dev/null 2>&1; then
              echo "✅ Local OIDC server healthy (attempt ${i})"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Local OIDC server did not become healthy within 60s"
          docker logs auth-lab-local-oidc --tail=100 || true
          exit 1

      - name: Seed E2E fixtures
        run: |
          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            exec -T backend \
            yarn workspace @auth-lab/backend db:seed:e2e

      - name: Flush Redis (reset rate limit counters)
        run: |
          docker exec auth-lab-redis redis-cli FLUSHALL > /dev/null
          echo "Redis flushed — rate limit counters reset for clean E2E run."

      - name: Run Playwright auth smoke tests
        run: yarn test:e2e
        env:
          MAILPIT_API_URL: http://localhost:8025
          CI: 'true'
          LOCAL_OIDC_ENABLED: 'true'

      - name: Upload traces and screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

      - name: Dump Docker logs on failure
        if: failure()
        run: |
          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            logs proxy backend frontend local-oidc --tail=100

      - name: Tear down stack
        if: always()
        run: |
          docker compose --env-file infra/.env.stack \
            -f infra/docker-compose.yml \
            -f infra/docker-compose-ci-oidc.yml \
            down -v
