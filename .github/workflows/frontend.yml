name: Frontend

on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  # ── Job 1: typecheck + unit tests ──────────────────────────────────────────
  # Fast gate. No Docker. Fails in ~2 minutes if types or unit tests are broken.
  # E2E does not start until this passes.

  unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck:frontend

      - name: Unit tests
        run: yarn test:frontend:unit
        env:
          NODE_ENV: test

  # ── Job 2: Playwright E2E against real Docker stack ────────────────────────
  # Full topology: Caddy proxy + Fastify backend + Next.js frontend + Postgres
  # + Redis + Mailpit. Proves session, cookie, proxy, SSR, and email delivery.
  # Only runs after unit job passes.

  e2e:
    name: Playwright auth smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: yarn install --immutable

      - name: Install Playwright Chromium
        run: yarn workspace frontend playwright install chromium --with-deps

      # BCRYPT_COST=4 keeps hash operations fast in CI (not 12).
      # OUTBOX_POLL_INTERVAL_MS=2000 means email arrives within ~2s of send.
      # SSO credentials are placeholders — no live OAuth round-trip in CI.

      - name: Write infra/.env.stack for CI
        run: |
          cat > infra/.env.stack << 'ENVEOF'
          NODE_ENV=development
          PORT=3001
          POSTGRES_DB=auth_lab
          POSTGRES_USER=auth_lab
          POSTGRES_PASSWORD=auth_lab
          DATABASE_URL=postgres://auth_lab:auth_lab@postgres:5432/auth_lab
          REDIS_URL=redis://redis:6379
          LOG_LEVEL=info
          SERVICE_NAME=auth-lab-backend
          BCRYPT_COST=4
          SESSION_TTL_SECONDS=86400
          MFA_ISSUER=Hubins
          MFA_ENCRYPTION_KEY_BASE64=VjJlYds7lPHtOzCrEQNNR0O7Ukst5HzX+cnszDyXvq0=
          MFA_HMAC_KEY_BASE64=8Emt6e4gn6r8rgRGSuYTVQ+D/3upFEckXRoMQYKJRJ8=
          SSO_STATE_ENCRYPTION_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          SSO_REDIRECT_BASE_URL=http://goodwill-ca.lvh.me:3000/api
          GOOGLE_CLIENT_ID=ci-placeholder-google-client-id
          GOOGLE_CLIENT_SECRET=ci-placeholder-google-client-secret
          MICROSOFT_CLIENT_ID=ci-placeholder-microsoft-client-id
          MICROSOFT_CLIENT_SECRET=ci-placeholder-microsoft-client-secret
          OUTBOX_ENC_DEFAULT_VERSION=v1
          OUTBOX_ENC_KEY_V1=VjJlYds7lPHtOzCrEQNNR0O7Ukst5HzX+cnszDyXvq0=
          OUTBOX_POLL_INTERVAL_MS=2000
          OUTBOX_BATCH_SIZE=10
          OUTBOX_MAX_ATTEMPTS=5
          EMAIL_PROVIDER=smtp
          SMTP_HOST=mailpit
          SMTP_PORT=1025
          SMTP_SECURE=false
          SMTP_FROM=Hubins <noreply@hubins.local>
          SMTP_PUBLIC_BASE_URL=http://{tenantKey}.lvh.me:3000
          SEED_ON_START=true
          SEED_TENANT_KEY=goodwill-ca
          SEED_TENANT_NAME=GoodWill California
          SEED_ADMIN_EMAIL=system_admin@example.com
          SEED_INVITE_TTL_HOURS=168
          FRONTEND_INTERNAL_API_URL=http://backend:3001
          NEXT_PUBLIC_ENV=development
          ENVEOF

      - name: Start Docker Compose stack
        run: |
          docker compose --env-file infra/.env.stack -f infra/docker-compose.yml \
            up --build -d

      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://goodwill-ca.lvh.me:3000/api/health > /dev/null 2>&1; then
              echo "✅ Backend healthy (attempt ${i})"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Backend did not become healthy within 180s"
          docker compose --env-file infra/.env.stack -f infra/docker-compose.yml logs --tail=150
          exit 1

      - name: Seed E2E fixtures
        run: |
          docker compose --env-file infra/.env.stack -f infra/docker-compose.yml \
            exec -T backend \
            yarn workspace @auth-lab/backend db:seed:e2e

      # WHY flush Redis before Playwright:
      # - Rate limiters use Redis counters keyed by user/IP with a 15-min window.
      # - A fresh stack starts with an empty Redis, so this step is a no-op on
      #   first run. On re-runs (e.g. flaky retry), it resets any leftover counters
      #   from the previous attempt so tests never get 429s on legitimate actions.
      - name: Flush Redis (reset rate limit counters)
        run: |
          docker exec auth-lab-redis redis-cli FLUSHALL > /dev/null
          echo "Redis flushed — rate limit counters reset for clean E2E run."

      - name: Run Playwright auth smoke tests
        run: yarn test:e2e
        env:
          MAILPIT_API_URL: http://localhost:8025
          CI: 'true'

      - name: Upload traces and screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

      - name: Dump Docker logs on failure
        if: failure()
        run: |
          docker compose --env-file infra/.env.stack -f infra/docker-compose.yml \
            logs proxy backend frontend --tail=100

      - name: Tear down stack
        if: always()
        run: |
          docker compose --env-file infra/.env.stack -f infra/docker-compose.yml down -v
