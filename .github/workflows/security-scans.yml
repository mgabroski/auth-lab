name: Security Scans

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/**'
      - 'package.json'
      - 'yarn.lock'
      - '.gitleaks.toml'
      - '.github/workflows/security-scans.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
  push:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/**'
      - 'package.json'
      - 'yarn.lock'
      - '.gitleaks.toml'
      - '.github/workflows/security-scans.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-security:
    name: Secret + dependency scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.0 \
            dir . \
            --config .gitleaks.toml \
            --no-banner

      - name: Dependency vulnerability scan (filesystem)
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/aquasecurity/trivy:0.63.0 \
            fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            .

  container-security:
    name: Container image scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build backend image for scan
        run: docker build -f backend/Dockerfile -t auth-lab/backend:security-scan .

      - name: Build frontend image for scan
        run: docker build -f frontend/Dockerfile -t auth-lab/frontend:security-scan .

      - name: Scan backend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:0.63.0 \
            image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            auth-lab/backend:security-scan

      - name: Scan frontend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:0.63.0 \
            image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            auth-lab/frontend:security-scan
