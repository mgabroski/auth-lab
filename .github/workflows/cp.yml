name: Control Plane

on:
  push:
    paths:
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - 'eslint.config.mjs'
      - 'cp/**'
      - '.github/workflows/cp.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
      - 'eslint.config.mjs'
      - 'cp/**'
      - '.github/workflows/cp.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack and activate repo Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint Control Plane
        run: yarn lint:cp

      - name: Typecheck Control Plane
        run: yarn typecheck:cp

      - name: Build Control Plane
        run: yarn build:cp
        env:
          NODE_ENV: production
