name: Backend Tests

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend unit + DAL + E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://auth_lab:auth_lab@localhost:5432/auth_lab_test
      REDIS_URL: redis://localhost:6379
      LOG_LEVEL: warn
      SERVICE_NAME: auth-lab-backend

      # Config parse / crypto / auth
      BCRYPT_COST: 4
      SESSION_TTL_SECONDS: 3600
      MFA_ISSUER: Hubins
      MFA_ENCRYPTION_KEY_BASE64: VjJlYds7lPHtOzCrEQNNR0O7Ukst5HzX+cnszDyXvq0=
      MFA_HMAC_KEY_BASE64: 8Emt6e4gn6r8rgRGSuYTVQ+D/3upFEckXRoMQYKJRJ8=
      SSO_STATE_ENCRYPTION_KEY: g+0YvJfzVdIgM+eoUUQ5UW3JKuGktJbtA6mvi3DcZDQ=
      SSO_REDIRECT_BASE_URL: http://goodwill-ca.lvh.me:3000/api
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      MICROSOFT_CLIENT_ID: test-microsoft-client-id
      MICROSOFT_CLIENT_SECRET: test-microsoft-client-secret

      # Outbox / email
      OUTBOX_ENC_DEFAULT_VERSION: v1
      OUTBOX_ENC_KEY_V1: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      OUTBOX_POLL_INTERVAL_MS: 5000
      OUTBOX_BATCH_SIZE: 10
      OUTBOX_MAX_ATTEMPTS: 5
      EMAIL_PROVIDER: noop

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: auth_lab_test
          POSTGRES_USER: auth_lab
          POSTGRES_PASSWORD: auth_lab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth_lab -d auth_lab_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and activate repo Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run database migrations
        run: yarn workspace @auth-lab/backend db:migrate

      - name: Run backend tests
        run: yarn workspace @auth-lab/backend test

      - name: Typecheck backend
        run: yarn typecheck:backend

      - name: Dump logs on failure
        if: failure()
        run: echo "Tests failed — check the step output above for details"
