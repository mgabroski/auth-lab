name: Frontend Tests

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  workflow_dispatch:

jobs:
  frontend-tests:
    name: Frontend typecheck + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck:frontend

      - name: Unit tests
        run: yarn workspace frontend test:unit
        env:
          NODE_ENV: test

  # E2E tests are intentionally excluded from CI for now.
  # Playwright E2E requires a running Next.js dev server against a mock backend,
  # which is expensive in CI and covered by the pre-push hook locally.
  #
  # NAMED TRIGGER: add a frontend-e2e job here when the frontend module surface
  # is large enough that local-only E2E coverage creates meaningful regression risk.
  # At that point, build a production Next.js server (next build && next start)
  # for CI E2E, which supports fullyParallel: true safely.
