title = "Auth-Lab gitleaks config"

[extend]
useDefault = true

# Allow only exact known fake/example values in exact known repo locations.
# Do not broaden without review.

[[allowlists]]
description = "Allow current fake MFA encryption example key in workflows and example env files"
condition = "AND"
regexTarget = "match"
regexes = ['''N0uFFqX7KeFnhghnTMaeBdLKsn\+W2Q9WJE1D2Aqdf14=''']
paths = [
    '''^\.github/workflows/cp\.yml$''',
    '''^\.github/workflows/frontend\.yml$''',
    '''^\.github/workflows/proxy-conformance\.yml$''',
    '''^backend/\.env\.example$''',
    '''^infra/\.env\.stack\.example$''',
]

[[allowlists]]
description = "Allow current fake MFA HMAC example key in workflows and example env files"
condition = "AND"
regexTarget = "match"
regexes = ['''ygcc6Pr65aoBSF469cwcsVj\+ARz1Pb2voHHHtt3bbCQ=''']
