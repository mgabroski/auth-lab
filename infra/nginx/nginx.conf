# infra/nginx/nginx.conf
#
# WHY:
# - Production proxy configuration (CORRECTED v2 from topology doc Section 3.4).
# - Three errors from v1 are fixed:
#   (1) X-Forwarded-Host added (was missing)
#   (2) X-Forwarded-For appends to chain ($proxy_add_x_forwarded_for) — never collapses
#   (3) /_next/* explicit route (was __nextjs_* which does not exist)
#
# DRIFT SAFETY:
# - This nginx config and infra/caddy/Caddyfile implement the SAME routing contract
#   from topology doc Section 3.1. The proxy conformance tests (PT-01 to PT-08) run
#   against whichever proxy is active and verify both.
#
# RULES:
# - Only *.hubins.com wildcard is served.
# - TLS cert paths must be updated before production deploy.
# - No CORS headers. Same-origin architecture.

server {
    listen 443 ssl http2;
    server_name *.hubins.com;

    ssl_certificate     /etc/certs/hubins.crt;
    ssl_certificate_key /etc/certs/hubins.key;

    # CORRECTED: X-Forwarded-Host added, IP chain preserved (not collapsed)
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #                                  ^^^ appends to chain, never collapses

    # CORRECTED: /_next/* explicit route for Next.js assets and HMR
    location /_next/ {
        proxy_pass http://frontend:3000;
        # WebSocket upgrade for Next.js HMR in dev
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Tenant hosts must never expose CP backend routes.
    location /api/cp/ {
        return 404;
    }

    # /api/* → backend (strip /api prefix)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:3001;
    }

    # All other routes → Next.js frontend
    location / {
        proxy_pass http://frontend:3000;
    }
}

server {
    listen 443 ssl http2;
    server_name cp.hubins.com;

    ssl_certificate     /etc/certs/hubins.crt;
    ssl_certificate_key /etc/certs/hubins.key;

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    location /_next/ {
        proxy_pass http://cp:3002;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:3001;
    }

    location / {
        proxy_pass http://cp:3002;
    }
}