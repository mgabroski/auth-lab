name: hubins

services:
  local-oidc:
    build:
      context: ./oidc-server
      dockerfile: Dockerfile
    container_name: auth-lab-local-oidc
    environment:
      LOCAL_OIDC_PORT: 9998
      LOCAL_OIDC_ISSUER: http://local-oidc:9998
      LOCAL_OIDC_CLIENT_ID: ${LOCAL_OIDC_CLIENT_ID:-local-oidc-ci-client}
    ports:
      - '9998:9998'
    networks: [hubins_net]
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:9998/.well-known/jwks.json\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  backend:
    environment:
      LOCAL_OIDC_ENABLED: 'true'
      LOCAL_OIDC_ISSUER: http://local-oidc:9998
      LOCAL_OIDC_CLIENT_ID: ${LOCAL_OIDC_CLIENT_ID:-local-oidc-ci-client}
    depends_on:
      local-oidc:
        condition: service_healthy
