name: hubins-infra

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: auth-lab-mailpit
    ports:
      - '8025:8025'
      - '1025:1025'

  postgres:
    image: postgres:17
    container_name: auth-lab-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - hubins_infra_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: auth-lab-redis
    ports:
      - '6379:6379'
    volumes:
      - hubins_infra_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  hubins_infra_pg:
  hubins_infra_redis:
