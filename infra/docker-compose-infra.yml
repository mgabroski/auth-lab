name: hubins-infra

services:
  local-oidc:
    build:
      context: ./oidc-server
      dockerfile: Dockerfile
    container_name: auth-lab-local-oidc
    environment:
      LOCAL_OIDC_PORT: 9998
      # WHY localhost and not local-oidc:
      # In host-run mode (yarn dev) the backend runs on the host, not inside
      # Docker. The backend calls this URL to fetch JWKS and validate tokens.
      # The container exposes port 9998 to the host, so localhost:9998 is the
      # correct address. The CI overlay uses local-oidc:9998 (Docker-internal
      # DNS) because both backend and OIDC server are in the same network there.
      LOCAL_OIDC_ISSUER: http://localhost:9998
      LOCAL_OIDC_CLIENT_ID: local-oidc-ci-client
    ports:
      - '9998:9998'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9998/.well-known/jwks.json || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: auth-lab-mailpit
    ports:
      - '8025:8025'
      - '1025:1025'

  postgres:
    image: postgres:17
    container_name: auth-lab-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - hubins_infra_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: auth-lab-redis
    ports:
      - '6379:6379'
    volumes:
      - hubins_infra_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  hubins_infra_pg:
  hubins_infra_redis:
