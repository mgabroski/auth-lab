name: hubins

networks:
  hubins_net:
    driver: bridge

services:
  proxy:
    image: caddy:2
    ports:
      - '3000:3000'
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [hubins_net]
    depends_on:
      # WHY: proxy depends only on backend being healthy, not on frontend being started.
      #
      # The previous dependency was:
      #   frontend: condition: service_started
      #   backend:  condition: service_healthy
      #
      # That was the root cause of CI "Wait for backend healthy" timing out.
      # Caddy only binds port 3000 after ALL depends_on conditions are satisfied.
      # The frontend Docker image build (yarn install + next build --standalone)
      # takes 5–15 minutes in a cold GitHub Actions runner. The CI health-check
      # step polls goodwill-ca.lvh.me:3000/api/health (through this proxy) with a
      # 180s ceiling — it always timed out before the frontend build completed and
      # Caddy started.
      #
      # The fix: remove the frontend condition entirely. Caddy starts as soon as the
      # backend is healthy. Caddy's reverse_proxy handles an unreachable frontend
      # gracefully — it returns 502 for /* and /_next/* routes while the frontend
      # container is still building, but /api/* routes to the backend work
      # immediately. This is the correct behaviour: the proxy is a network component,
      # not a readiness gate for the frontend application layer.
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        # WHY: next.config.ts validates INTERNAL_API_URL at startup, which includes
        # during `next build`. Passing it as a build arg satisfies the check.
        # The Dockerfile defaults to http://backend:3001 so this arg is optional,
        # but explicit is better — it documents the intent and allows override.
        INTERNAL_API_URL: ${FRONTEND_INTERNAL_API_URL}
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: ${FRONTEND_INTERNAL_API_URL}
      NEXT_PUBLIC_ENV: ${NEXT_PUBLIC_ENV}
    networks: [hubins_net]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cp:
    build:
      context: ..
      dockerfile: cp/Dockerfile
      args:
        # WHY: cp/next.config.ts validates INTERNAL_API_URL during `next build`
        # in non-development environments. Use the same Docker-internal backend
        # URL at build time and at runtime to keep the SSR contract honest.
        INTERNAL_API_URL: ${CP_INTERNAL_API_URL}
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: ${CP_INTERNAL_API_URL}
      CP_ENABLED: ${CP_ENABLED}
      CP_AUTH_MODE: ${CP_AUTH_MODE}
    networks: [hubins_net]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      SERVICE_NAME: ${SERVICE_NAME}
      BCRYPT_COST: ${BCRYPT_COST}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS}
      MFA_ISSUER: ${MFA_ISSUER}
      MFA_ENCRYPTION_KEY_BASE64: ${MFA_ENCRYPTION_KEY_BASE64}
      MFA_HMAC_KEY_BASE64: ${MFA_HMAC_KEY_BASE64}
      SSO_STATE_ENCRYPTION_KEY: ${SSO_STATE_ENCRYPTION_KEY}
      SSO_REDIRECT_BASE_URL: ${SSO_REDIRECT_BASE_URL}
      CP_ENABLED: ${CP_ENABLED}
      CP_AUTH_MODE: ${CP_AUTH_MODE}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      OUTBOX_ENC_DEFAULT_VERSION: ${OUTBOX_ENC_DEFAULT_VERSION}
      OUTBOX_ENC_KEY_V1: ${OUTBOX_ENC_KEY_V1}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE}
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_PUBLIC_BASE_URL: ${SMTP_PUBLIC_BASE_URL}
      SEED_ON_START: ${SEED_ON_START}
      SEED_TENANT_KEY: ${SEED_TENANT_KEY}
      SEED_TENANT_NAME: ${SEED_TENANT_NAME}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_INVITE_TTL_HOURS: ${SEED_INVITE_TTL_HOURS}
    networks: [hubins_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:${PORT}/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: auth-lab-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - hubins_pg:/var/lib/postgresql/data
    networks: [hubins_net]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: auth-lab-redis
    ports:
      - '6379:6379'
    volumes:
      - hubins_redis:/data
    networks: [hubins_net]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: auth-lab-mailpit
    ports:
      - '8025:8025'
      - '1025:1025'
    networks: [hubins_net]
    restart: unless-stopped

volumes:
  hubins_pg:
  hubins_redis:
